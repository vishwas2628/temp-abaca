{% extends "admin/change_list.html" %}
{% load i18n admin_urls static admin_list %}

{% block search %}
  {% search_form cl %}
  <a href="?refresh" id="refresh-results-btn">Refresh matching results</a>
{% endblock %}

{% block footer %}
{{ block.super }}
<script type="text/javascript">
// Add results list links
const companies = document.querySelectorAll('#result_list .action-checkbox');
for(i = 0; i < companies.length; i++) {
  company_id = companies[i].firstChild.value
  company_text = companies[i].nextSibling
  company_text.innerHTML = '<a href="' + company_id + '">' + company_text.innerHTML + '</a>';
}

// Refresh button
const refreshBtn = document.getElementById('refresh-results-btn')
refreshBtn.addEventListener('click', () => {
  document.body.classList.add('refreshing')
});

// Clear refresh query param (if exists) to avoid performance issues:
const queryString = window.location.search;
if (queryString.includes("refresh")) {
  window.history.pushState({}, document.title, window.location.pathname);
}
</script>
{% endblock %}

{% block object-tools %}
<style>
body.refreshing {
  cursor: progress;
  opacity: 0.2;
}

#refresh-results-btn {
  display: inline-block;
  padding: 3px 12px;
  margin: 10px 0 20px;

  background: #999;
  font-weight: 400;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #fff;
  border-radius: 15px;
  cursor: pointer;
  outline: none;
}

#refresh-results-btn:hover {
  background: #333;
}
</style>
{% endblock %}
